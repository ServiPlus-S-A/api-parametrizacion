name: CD - Deploy to EC2 & Vercel

on:
  push:
    branches:
      - main

jobs:
  define-environment:
    name: Define Profile Environment
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set_env.outputs.ENV_NAME }}
      image_tag: ${{ steps.set_env.outputs.IMAGE_TAG }}
    steps:
      - name: Determine Environment based on Branch
        id: set_env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=production" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=staging" >> $GITHUB_OUTPUT
          fi
          # Evitamos "latest": usamos el SHA del commit para trazabilidad exacta
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # 2. Build & Push
  # ──────────────────────────────────────────────
  build-and-push-backend:
    name: Build & Push API and Microservice
    needs: [define-environment]
    runs-on: ubuntu-latest
    environment: ${{ needs.define-environment.outputs.env_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ needs.define-environment.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Microservice
        uses: docker/build-push-action@v5
        with:
          context: ./microservice-parametrizacion
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microservice-parametrizacion:${{ needs.define-environment.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 4. Deploy backend en EC2
  # ──────────────────────────────────────────────
  deploy-backend-ec2:
    name: Deploy Backend to AWS EC2
    needs: [define-environment, build-and-push-backend]
    runs-on: ubuntu-latest
    environment: ${{ needs.define-environment.outputs.env_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/deploy-serviplus"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ needs.define-environment.outputs.image_tag }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME,IMAGE_TAG,JWT_SECRET,DB_HOST,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME
          script: |
            set -e
            cd ~/deploy-serviplus

            # Permisos restrictivos antes de escribir secrets
            umask 077

            # Genera el .env dinámicamente con los secrets de GitHub
            cat > .env <<EOF
            DOCKER_USERNAME=$DOCKER_USERNAME
            IMAGE_TAG=$IMAGE_TAG
            JWT_SECRET=$JWT_SECRET
            DB_HOST=$DB_HOST
            DB_PORT=$DB_PORT
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_NAME=$DB_NAME
            EOF

            chmod 600 .env

            # Pull de las nuevas imágenes
            docker compose -f docker-compose.prod.yml pull

            # Levanta los contenedores. --remove-orphans limpia servicios
            # que fueron renombrados o eliminados del compose.
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check post-deploy: espera hasta 60s que ambos servicios estén healthy
            echo "Esperando que los servicios levanten..."
            for i in $(seq 1 12); do
              GW_STATUS=$(docker inspect --format='{{.State.Health.Status}}' deploy-serviplus-api-gateway-1 2>/dev/null || echo "not_found")
              MS_STATUS=$(docker inspect --format='{{.State.Health.Status}}' deploy-serviplus-microservice-1 2>/dev/null || echo "not_found")

              echo "Intento $i/12 — gateway: $GW_STATUS | microservice: $MS_STATUS"

              if [[ "$MS_STATUS" == "healthy" ]]; then
                echo "✅ Deploy exitoso"
                break
              fi

              if [[ $i -eq 12 ]]; then
                echo "❌ Timeout: los servicios no levantaron en 60 segundos"
                docker compose -f docker-compose.prod.yml logs --tail=50
                exit 1
              fi

              sleep 5
            done

            # Limpia solo imágenes dangling (las <none>:<none>).
            # NO usamos -a para conservar la imagen anterior como fallback de rollback manual.
            docker image prune -f

