name: CI Microservice
on:
  pull_request:
    branches:
      - develop
    paths:
      - 'microservice-parametrizacion/**'
      - '.github/workflows/ci-microservice.yml'

jobs:
  ci-microservice:
    name: CI Microservice
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./microservice-parametrizacion
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: 'microservice-parametrizacion/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Check types
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Run tests with coverage
        run: npm run test:cov
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image (Verify Only)
        uses: docker/build-push-action@v5
        with:
          context: ./microservice-parametrizacion
          push: false
          tags: microservice:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
