sonar.projectKey=ServiPlus-S-A_api-parametrizacion
sonar.organization=serviplus-s-a
sonar.projectName=API Parametrización - Backend

sonar.sources=src
sonar.tests=src,test
sonar.test.inclusions=**/*.spec.ts,**/*e2e-spec.ts

