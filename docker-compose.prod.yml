version: '3.8'
services:
  api-gateway:
    image: ${DOCKER_USERNAME}/api-gateway:${IMAGE_TAG:-latest}
    ports:
      - "80:3000" 
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      - SERVICES_PARAMETRIZACION_URL=http://microservice:3001
      - SERVICES_PARAMETRIZACION_AUTH=true
      - SERVICES_DOCS_URL=http://microservice:3001
      - SERVICES_DOCS_AUTH=false
    depends_on:
      microservice:
        condition: service_healthy
    networks:
      - serviplus_net
    restart: unless-stopped

  microservice:
    image: ${DOCKER_USERNAME}/microservice-parametrizacion:${IMAGE_TAG:-latest}
    environment:
      - PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - serviplus_net
    restart: unless-stopped

networks:
  serviplus_net:
    driver: bridge
