version: '3.8'
services:
  database:
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - serviplus_net

  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
      # Microservice Registry — add new services here
      - SERVICES_PARAMETRIZACION_URL=http://microservice:3001
      - SERVICES_PARAMETRIZACION_AUTH=true
      - SERVICES_AUTH_URL=http://microservice:3001
      - SERVICES_AUTH_AUTH=false
    depends_on:
      microservice:
        condition: service_healthy
    networks:
      - serviplus_net

  microservice:
    build: 
      context: ./microservice-parametrizacion
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - serviplus_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NEXT_PUBLIC_BFF_URL=http://localhost:3000
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - serviplus_net

networks:
  serviplus_net:
    driver: bridge

volumes:
  pgdata:
